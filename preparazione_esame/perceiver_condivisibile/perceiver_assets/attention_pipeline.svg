<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Scaled dot-product attention pipeline</title>
  <desc id="desc">Query and key matrices form scores, scores are scaled and normalized, then multiplied by values.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a237e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1a237e" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="22" fill="#fbfbfd"/>
  <text x="60" y="64" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Scaled dot-product: la pipeline completa</text>
  <text x="60" y="98" fill="#5f6472" font-family="Segoe UI, Arial, sans-serif" font-size="18">Ogni riga di Q e' un latente che distribuisce attenzione su tutti gli M input.</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="60" y="180" width="135" height="120" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="127" y="225" text-anchor="middle" fill="#1a237e" font-size="34" font-weight="800">Q</text>
    <text x="127" y="258" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="15">512 x 261</text>
    <text x="127" y="282" text-anchor="middle" fill="#3c3c3c" font-size="14">dai latenti</text>

    <rect x="60" y="330" width="135" height="120" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="127" y="375" text-anchor="middle" fill="#2e7d32" font-size="34" font-weight="800">V</text>
    <text x="127" y="408" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="15">50176 x 261</text>
    <text x="127" y="432" text-anchor="middle" fill="#3c3c3c" font-size="14">dall'input</text>

    <rect x="255" y="180" width="135" height="120" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="322" y="225" text-anchor="middle" fill="#2e7d32" font-size="34" font-weight="800">K^T</text>
    <text x="322" y="258" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="15">261 x 50176</text>
    <text x="322" y="282" text-anchor="middle" fill="#3c3c3c" font-size="14">etichette input</text>
  </g>

  <line x1="405" y1="240" x2="500" y2="240" stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="428" y="214" fill="#1a237e" font-family="Consolas, monospace" font-size="17">QK^T</text>

  <g filter="url(#shadow)">
    <rect x="520" y="170" width="150" height="140" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="595" y="216" text-anchor="middle" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">S</text>
    <text x="595" y="248" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="15">512 x 50176</text>
    <text x="595" y="276" text-anchor="middle" fill="#3c3c3c" font-family="Segoe UI, Arial, sans-serif" font-size="14">score grezzi</text>
  </g>

  <line x1="690" y1="240" x2="775" y2="240" stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="703" y="214" fill="#1a237e" font-family="Consolas, monospace" font-size="17">/sqrt(261)</text>

  <g filter="url(#shadow)">
    <rect x="795" y="170" width="150" height="140" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="870" y="216" text-anchor="middle" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">softmax</text>
    <text x="870" y="248" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="15">per riga</text>
    <text x="870" y="276" text-anchor="middle" fill="#3c3c3c" font-family="Segoe UI, Arial, sans-serif" font-size="14">somma = 1</text>
  </g>

  <line x1="965" y1="240" x2="1050" y2="240" stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="985" y="214" fill="#1a237e" font-family="Consolas, monospace" font-size="17">A * V</text>
  <line x1="195" y1="390" x2="1042" y2="390" stroke="#2e7d32" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8 8"/>

  <g filter="url(#shadow)">
    <rect x="1065" y="170" width="105" height="220" rx="16" fill="#e8f5e9" stroke="#a5d6a7"/>
    <text x="1118" y="235" text-anchor="middle" fill="#2e7d32" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">F</text>
    <text x="1118" y="268" text-anchor="middle" fill="#2e7d32" font-family="Consolas, monospace" font-size="14">512 x</text>
    <text x="1118" y="290" text-anchor="middle" fill="#2e7d32" font-family="Consolas, monospace" font-size="14">261</text>
    <text x="1118" y="330" text-anchor="middle" fill="#3c3c3c" font-family="Segoe UI, Arial, sans-serif" font-size="14">feature</text>
    <text x="1118" y="350" text-anchor="middle" fill="#3c3c3c" font-family="Segoe UI, Arial, sans-serif" font-size="14">lette</text>
  </g>
</svg>
