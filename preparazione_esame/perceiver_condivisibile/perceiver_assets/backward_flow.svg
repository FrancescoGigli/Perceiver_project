<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Backward pass through Perceiver</title>
  <desc id="desc">Gradients flow backward from loss to input, with three key results highlighted.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a237e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1a237e" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="500" rx="22" fill="#fbfbfd"/>
  <text x="60" y="64" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Backward pass: tre cose da ricordare</text>
  <text x="60" y="98" fill="#5f6472" font-family="Segoe UI, Arial, sans-serif" font-size="18">Il percorso e' meccanico; all'orale contano questi tre risultati.</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="170" width="130" height="70" rx="14" fill="#e8f5e9" stroke="#a5d6a7"/>
    <text x="135" y="214" text-anchor="middle" fill="#2e7d32" font-size="19" font-weight="800">Loss</text>
    <rect x="245" y="170" width="130" height="70" rx="14" fill="#fff" stroke="#dfe3ef"/>
    <text x="310" y="214" text-anchor="middle" fill="#1a237e" font-size="17" font-weight="700">Softmax</text>
    <rect x="420" y="170" width="130" height="70" rx="14" fill="#fff" stroke="#dfe3ef"/>
    <text x="485" y="214" text-anchor="middle" fill="#1a237e" font-size="17" font-weight="700">Classifier</text>
    <rect x="595" y="170" width="130" height="70" rx="14" fill="#fff" stroke="#dfe3ef"/>
    <text x="660" y="214" text-anchor="middle" fill="#1a237e" font-size="17" font-weight="700">Pooling</text>
    <rect x="770" y="170" width="130" height="70" rx="14" fill="#fff" stroke="#dfe3ef"/>
    <text x="835" y="205" text-anchor="middle" fill="#1a237e" font-size="16" font-weight="700">Latent</text>
    <text x="835" y="225" text-anchor="middle" fill="#1a237e" font-size="16" font-weight="700">Transformer</text>
    <rect x="945" y="170" width="130" height="70" rx="14" fill="#fff" stroke="#dfe3ef"/>
    <text x="1010" y="205" text-anchor="middle" fill="#1a237e" font-size="16" font-weight="700">Cross</text>
    <text x="1010" y="225" text-anchor="middle" fill="#1a237e" font-size="16" font-weight="700">Attention</text>
  </g>

  <g stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)">
    <line x1="220" y1="205" x2="238" y2="205"/>
    <line x1="395" y1="205" x2="413" y2="205"/>
    <line x1="570" y1="205" x2="588" y2="205"/>
    <line x1="745" y1="205" x2="763" y2="205"/>
    <line x1="920" y1="205" x2="938" y2="205"/>
  </g>
  <text x="580" y="270" text-anchor="middle" fill="#6e6e76" font-family="Consolas, monospace" font-size="16">ordine inverso del forward</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="85" y="330" width="300" height="105" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="115" y="365" fill="#1a237e" font-size="18" font-weight="800">1. Softmax + CE</text>
    <text x="115" y="398" fill="#3c3c3c" font-family="Consolas, monospace" font-size="20">dL/dz = p - y</text>

    <rect x="450" y="330" width="300" height="105" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="480" y="365" fill="#1a237e" font-size="18" font-weight="800">2. Pesi condivisi</text>
    <text x="480" y="398" fill="#3c3c3c" font-family="Consolas, monospace" font-size="18">grad = sum_t grad_t</text>

    <rect x="815" y="330" width="300" height="105" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="845" y="365" fill="#1a237e" font-size="18" font-weight="800">3. Residual</text>
    <text x="845" y="398" fill="#3c3c3c" font-family="Consolas, monospace" font-size="18">I + df/dL</text>
    <text x="845" y="421" fill="#2e7d32" font-size="15" font-weight="700">gradient highway</text>
  </g>
</svg>
