<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Perceiver latent bottleneck</title>
  <desc id="desc">A large input is compressed through a fixed latent bottleneck before deep latent processing.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1a237e"/>
      <stop offset="1" stop-color="#5c6bc0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#2e7d32"/>
      <stop offset="1" stop-color="#66bb6a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1a237e" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1a237e"/>
    </marker>
  </defs>
  <rect width="1200" height="500" rx="22" fill="#fbfbfd"/>
  <text x="60" y="62" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">La mossa del Perceiver: comprimere prima, ragionare dopo</text>
  <text x="60" y="96" fill="#5f6472" font-family="Segoe UI, Arial, sans-serif" font-size="18">Il costo non dipende piu' dalla self-attention su tutti gli M input, ma da N latenti fissi.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="145" width="240" height="240" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="95" y="180" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Input enorme X</text>
    <text x="95" y="207" fill="#6e6e76" font-family="Segoe UI, Arial, sans-serif" font-size="15">M = 50.176 pixel</text>
    <g transform="translate(95 230)">
      <rect width="24" height="24" fill="#b6d7a8"/><rect x="30" width="24" height="24" fill="#93c47d"/><rect x="60" width="24" height="24" fill="#76a5af"/><rect x="90" width="24" height="24" fill="#6fa8dc"/><rect x="120" width="24" height="24" fill="#8e7cc3"/>
      <rect y="30" width="24" height="24" fill="#f6b26b"/><rect x="30" y="30" width="24" height="24" fill="#ffd966"/><rect x="60" y="30" width="24" height="24" fill="#b6d7a8"/><rect x="90" y="30" width="24" height="24" fill="#6fa8dc"/><rect x="120" y="30" width="24" height="24" fill="#c27ba0"/>
      <rect y="60" width="24" height="24" fill="#93c47d"/><rect x="30" y="60" width="24" height="24" fill="#76a5af"/><rect x="60" y="60" width="24" height="24" fill="#8e7cc3"/><rect x="90" y="60" width="24" height="24" fill="#f6b26b"/><rect x="120" y="60" width="24" height="24" fill="#ffd966"/>
      <rect y="90" width="24" height="24" fill="#6fa8dc"/><rect x="30" y="90" width="24" height="24" fill="#c27ba0"/><rect x="60" y="90" width="24" height="24" fill="#93c47d"/><rect x="90" y="90" width="24" height="24" fill="#b6d7a8"/><rect x="120" y="90" width="24" height="24" fill="#76a5af"/>
    </g>
    <text x="95" y="360" fill="#3c3c3c" font-family="Consolas, monospace" font-size="18">O(M^2) sarebbe troppo</text>
  </g>

  <line x1="330" y1="265" x2="455" y2="265" stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="342" y="238" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">cross-attention</text>

  <g filter="url(#shadow)">
    <rect x="475" y="125" width="170" height="280" rx="18" fill="#fff" stroke="#dfe3ef"/>
    <text x="505" y="162" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Latenti L</text>
    <text x="505" y="188" fill="#6e6e76" font-family="Segoe UI, Arial, sans-serif" font-size="15">N = 512</text>
    <g transform="translate(515 220)">
      <rect width="18" height="18" rx="3" fill="#1a237e"/><rect x="24" width="18" height="18" rx="3" fill="#3949ab"/><rect x="48" width="18" height="18" rx="3" fill="#5c6bc0"/><rect x="72" width="18" height="18" rx="3" fill="#9fa8da"/>
      <rect y="24" width="18" height="18" rx="3" fill="#283593"/><rect x="24" y="24" width="18" height="18" rx="3" fill="#5c6bc0"/><rect x="48" y="24" width="18" height="18" rx="3" fill="#7986cb"/><rect x="72" y="24" width="18" height="18" rx="3" fill="#c5cae9"/>
      <rect y="48" width="18" height="18" rx="3" fill="#1a237e"/><rect x="24" y="48" width="18" height="18" rx="3" fill="#3949ab"/><rect x="48" y="48" width="18" height="18" rx="3" fill="#5c6bc0"/><rect x="72" y="48" width="18" height="18" rx="3" fill="#9fa8da"/>
      <rect y="72" width="18" height="18" rx="3" fill="#283593"/><rect x="24" y="72" width="18" height="18" rx="3" fill="#5c6bc0"/><rect x="48" y="72" width="18" height="18" rx="3" fill="#7986cb"/><rect x="72" y="72" width="18" height="18" rx="3" fill="#c5cae9"/>
    </g>
    <text x="505" y="350" fill="#3c3c3c" font-family="Consolas, monospace" font-size="18">N &lt;&lt; M</text>
  </g>

  <line x1="665" y1="265" x2="790" y2="265" stroke="#1a237e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="690" y="238" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">self-attention</text>

  <g filter="url(#shadow)">
    <rect x="810" y="145" width="300" height="240" rx="16" fill="#fff" stroke="#dfe3ef"/>
    <text x="845" y="180" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Latent transformer profondo</text>
    <g transform="translate(855 220)">
      <rect width="210" height="34" rx="8" fill="#e8eaf6" stroke="#c5cae9"/>
      <rect y="48" width="210" height="34" rx="8" fill="#e8eaf6" stroke="#c5cae9"/>
      <rect y="96" width="210" height="34" rx="8" fill="#e8eaf6" stroke="#c5cae9"/>
      <text x="105" y="23" text-anchor="middle" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">self-att N x N</text>
      <text x="105" y="71" text-anchor="middle" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">MLP + residual</text>
      <text x="105" y="119" text-anchor="middle" fill="#1a237e" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">ripeti senza toccare M</text>
    </g>
    <text x="845" y="372" fill="#2e7d32" font-family="Consolas, monospace" font-size="18" font-weight="700">O(MN) + O(N^2)</text>
  </g>
</svg>
