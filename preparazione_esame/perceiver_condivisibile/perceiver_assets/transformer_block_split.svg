<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Blocco Transformer diviso in sottoblocchi</title>
  <desc id="desc">Diagramma del blocco encoder con self-attention, residual, layer normalization e feed-forward network.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8ff}.box{fill:#fff;stroke:#dce2f2;stroke-width:2}.attn{fill:#eef2ff;stroke:#b9c7ff}.mlp{fill:#fff3e0;stroke:#ffb36b}.norm{fill:#e8f5e9;stroke:#8ccf94}.txt{font-family:Arial,sans-serif;fill:#1f2430}.title{font-size:28px;font-weight:800;fill:#1a237e}.label{font-size:18px;font-weight:800}.small{font-size:15px;fill:#5d6472}.arrow{stroke:#1a237e;stroke-width:4;fill:none;marker-end:url(#arrow)}.skip{stroke:#e65100;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrowAccent)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#1a237e"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#e65100"/></marker>
  </defs>
  <rect class="bg" width="1280" height="420" rx="22"/>
  <text class="txt title" x="54" y="58">Encoder block: due sottoblocchi, stessa forma M x d</text>
  <rect class="box" x="70" y="150" width="150" height="78" rx="14"/><text class="txt label" x="116" y="181">x</text><text class="txt small" x="98" y="206">M x d</text>
  <path class="arrow" d="M230 189H314"/>
  <rect class="norm" x="326" y="132" width="170" height="114" rx="14"/><text class="txt label" x="378" y="174">LayerNorm</text><text class="txt small" x="362" y="202">pre o post norm</text>
  <path class="arrow" d="M506 189H586"/>
  <rect class="attn" x="598" y="132" width="190" height="114" rx="14"/><text class="txt label" x="634" y="174">Multi-head</text><text class="txt small" x="634" y="202">self-attention</text>
  <path class="arrow" d="M798 189H878"/>
  <circle cx="910" cy="189" r="28" fill="#1a237e"/><text class="txt label" x="902" y="196" fill="#fff">+</text>
  <path class="arrow" d="M948 189H1018"/>
  <rect class="mlp" x="1030" y="132" width="180" height="114" rx="14"/><text class="txt label" x="1080" y="174">FFN</text><text class="txt small" x="1060" y="202">512 -> 2048 -> 512</text>
  <path class="skip" d="M145 142C170 82 880 82 910 150"/>
  <text class="txt small" x="396" y="104">residual connection: il gradiente ha una strada diretta</text>
  <path class="skip" d="M910 226C940 318 1110 318 1120 248"/>
  <text class="txt small" x="960" y="344">seconda residual dopo l'MLP</text>
</svg>
