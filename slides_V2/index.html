<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perceiver - Slides V2</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #161616;
        --muted: #5d626b;
        --paper: #f7f5ef;
        --panel: #ffffff;
        --line: #d9d4c8;
        --accent: #0f766e;
        --accent-dark: #0b5d56;
        --mark: #b45309;
        --shadow: 0 18px 48px rgba(28, 24, 18, 0.14);
        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family:
          "Aptos",
          "Segoe UI",
          system-ui,
          sans-serif;
        line-height: 1.45;
        background:
          linear-gradient(90deg, rgba(22, 22, 22, 0.045) 1px, transparent 1px),
          linear-gradient(0deg, rgba(22, 22, 22, 0.04) 1px, transparent 1px),
          var(--paper);
        background-size: 44px 44px;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--mark);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 820px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 4.5rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .meta {
        margin: 14px 0 0;
        max-width: 740px;
        color: var(--muted);
        font-size: 1rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--ink);
        background: var(--panel);
        font-weight: 750;
        text-decoration: none;
        transition:
          transform 150ms var(--ease-out),
          border-color 150ms ease,
          background-color 150ms ease;
      }

      .button.primary {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
      }

      .button:active {
        transform: scale(0.97);
      }

      @media (hover: hover) and (pointer: fine) {
        .button:hover {
          border-color: var(--accent);
          background: #eef8f6;
        }

        .button.primary:hover {
          background: var(--accent-dark);
        }
      }

      .viewer {
        overflow: hidden;
        min-height: min(78vh, 860px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      iframe {
        display: block;
        width: 100%;
        height: min(78vh, 860px);
        border: 0;
        background: #fff;
      }

      .fallback {
        padding: 18px 20px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        background: #fffaf0;
      }

      .fallback a {
        color: var(--accent-dark);
        font-weight: 800;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 18px 0;
        }

        .header {
          grid-template-columns: 1fr;
          gap: 16px;
          align-items: start;
        }

        .actions {
          justify-content: flex-start;
        }

        .button {
          flex: 1 1 150px;
        }

        .viewer,
        iframe {
          min-height: 68vh;
          height: 68vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <p class="eyebrow">Slides V2</p>
          <h1>Perceiver Presentation</h1>
          <p class="meta">
            Presentazione PDF aggiornata da <code>slides_V2/perceiver_presentation_eng.pdf</code>.
          </p>
        </div>
        <nav class="actions" aria-label="Azioni documento">
          <a class="button primary" href="perceiver_presentation_eng.pdf">Open PDF</a>
          <a class="button" href="perceiver_presentation_eng.pdf" download>Download</a>
        </nav>
      </header>

      <section class="viewer" aria-label="Anteprima PDF">
        <iframe src="perceiver_presentation_eng.pdf#view=FitH" title="Perceiver Presentation PDF"></iframe>
        <div class="fallback">
          Se l'anteprima non viene caricata, apri il
          <a href="perceiver_presentation_eng.pdf">PDF delle slide</a>.
        </div>
      </section>
    </main>
  </body>
</html>
